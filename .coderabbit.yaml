# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
#
# CodeRabbit configuration for compose-nav-graph (Navigation 3 Plugin).
#
# This repository is NOT an app — it is a multi-module developer-tool suite:
#   - compose-nav-graph-annotations : KMP annotations + the @Serializable NavGraph wire model (schemaVersion 1)
#   - compose-nav-graph-ksp         : KSP processor emitting build/navgraph/nav-graph.json + preview-gallery.json
#   - compose-nav-graph-gradle      : Gradle plugin (separate included build) — KSP auto-wiring, Layoutlib/Robolectric
#                                     thumbnail rendering, cross-module aggregation, navDump/navCheck, HTML/PNG export
#   - compose-nav-graph-idea        : IntelliJ/Android Studio plugin (separate build) — flow-map tool window reading
#                                     the JSON manifests with Gson
#   - compose-nav-graph-testing     : published Robolectric render-test support (NavPreviewRenderTestBase)
#   - samples/ (sample, sample-kotlinconf, sample-nowinandroid) : integration samples only
#
# Review priorities follow from that: cross-module protocol compatibility (nav-graph.json schema, KSP option
# keys, render-list system properties, version pins) and "never break the consumer's build" failure-safety
# matter far more than style — formatting is fully owned by Spotless in CI.

language: "en-US"
early_access: false

tone_instructions: >-
  Review as a senior Kotlin KSP/Gradle/IntelliJ-plugin engineer. Prioritize
  correctness, cross-module protocol compatibility (JSON schema, option keys,
  system properties), and published-API backward compatibility. Never comment
  on formatting (Spotless owns it). Be direct; skip praise.

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: true

  auto_review:
    enabled: true
    drafts: false
    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"

  # ── What NOT to review ─────────────────────────────────────────────────────
  # Everything below the `!` lines is machine-generated, binary, or a baseline that must be
  # regenerated by a Gradle task instead of being hand-edited — review comments on these
  # files are pure noise.
  path_filters:
    # Exported graph/gallery artifacts (regenerated via exportNavGraphHtml/Image and
    # exportPreviewGalleryHtml/Image — never hand-written).
    - "!nav-results/**"
    # Nav baselines produced by the plugin's own `navDump` task; `navCheck` validates them.
    - "!**/nav/*.nav"
    # Binary-compatibility-validator dumps, regenerated via `./gradlew apiDump`.
    - "!**/api/*.api"
    # Kotlin/JS package-manager lockfiles (sample-kotlinconf js/wasmJs targets).
    - "!kotlin-js-store/**"
    # Images / marketing assets, IDE plugin icons, and screenshot-test goldens.
    - "!art/**"
    - "!**/*.png"
    - "!**/*.gif"
    - "!**/*.svg"
    - "!**/*.webp"
    # Gradle wrapper binaries/scripts and build outputs.
    - "!gradle/wrapper/**"
    - "!gradlew"
    - "!gradlew.bat"
    - "!**/build/**"
    - "!**/.gradle/**"
    # Spotless license-header templates (boilerplate by definition).
    - "!spotless/**"
    # Internal working notes for coding agents — not shipped, not user-facing.
    - "!tasks/**"
    - "!lessons/**"
    - "!plugin-agent-guides.md"
    - "!CLAUDE.md"
    # IDE metadata and GitHub boilerplate.
    - "!.idea/**"
    - "!**/*.iml"
    - "!.github/ISSUE_TEMPLATE/**"
    - "!.github/FUNDING.yml"
    - "!LICENSE"

  # ── Per-module review checklists ───────────────────────────────────────────
  path_instructions:
    # ===== compose-nav-graph-annotations: KMP annotations + wire model =====
    - path: "compose-nav-graph-annotations/src/**"
      instructions: >-
        Published KMP library (jvm/android/ios/js/wasmJs, explicit API mode) that owns BOTH the
        user-facing annotations and the NavGraph @Serializable wire model. Check:
        (1) SCHEMA IS A WIRE PROTOCOL — NavGraph/NavNode/NavArg/NavGraphEdge/NavPreviewRef are
        serialized by the KSP processor and parsed by the Gradle tasks AND the IDE plugin's
        Gson DTOs. Model changes must be additive with default values so older JSON still
        decodes; renaming/removing fields or changing EdgeConfidence values is a breaking
        protocol change that requires matching updates in compose-nav-graph-ksp,
        compose-nav-graph-gradle, and compose-nav-graph-idea (NavGraphDto and friends) in the
        SAME PR. A semantic change requires bumping SCHEMA_VERSION and reader handling.
        (2) ANNOTATION COMPAT — @NavDestination/@NavEdge/@NavGraphRoot/@NavPreview parameter
        changes need new parameters to be defaulted (source compat) and the KSP processor
        updated to read them; @NavPreview must stay RUNTIME-retained (reflection in the
        testing module), the others BINARY.
        (3) BINARY COMPAT — public API changes must be reflected in regenerated api/*.api
        dumps in the same PR (apiDump) and should be additive.
        (4) KMP — common code only; no platform-specific APIs in commonMain.

    # ===== compose-nav-graph-ksp: KSP processor =====
    - path: "compose-nav-graph-ksp/src/**"
      instructions: >-
        KSP processor (NavGraphProcessor) extracting the static graph. Check:
        (1) FAILURE SAFETY — the processor runs inside the consumer's build: malformed
        annotations, unresolvable types, or missing NavKey supertypes must produce KSP
        warnings/errors on the specific symbol and skip it — never throw out of process()
        and never abort the whole compilation for one bad declaration.
        (2) OUTPUT CONTRACT — nav-graph.json and preview-gallery.json names, the
        packageName=""/Dependencies.ALL_FILES placement (build/navgraph/), and the serialized
        NavGraph shape are load-bearing: MergeNavGraphTask, LayoutlibRenderTask, and the IDE
        plugin's NavGraphReader all hardcode them. Flag any change to file names, locations,
        or JSON shape that lacks matching downstream updates.
        (3) OPTION KEYS — OPT_ANNOTATED_ONLY ("navgraph.annotatedOnly") and OPT_MODULE
        ("navgraph.module") must exactly match the strings the Gradle plugin injects via
        ksp.arg(...); flag one-sided renames.
        (4) DETERMINISM — emitted JSON must be stable across runs (ordering of nodes, edges,
        previews) because navDump baselines and aggregation diffs depend on it.
        (5) SOURCE LOCATIONS — clickTargetFqn/sourceFile/sourceLine feed IDE click-to-source;
        line numbers are 1-based.
        (6) Edge validation must keep dropping orphaned edges with a warning, not failing.

    # ===== compose-nav-graph-gradle: Gradle plugin (separate included build) =====
    - path: "compose-nav-graph-gradle/src/main/**"
      instructions: >-
        Gradle plugin (id com.github.skydoves.navgraph), consumed by arbitrary Android/KMP
        projects. Check:
        (1) NEVER BREAK THE CONSUMER'S BUILD — render failures must degrade (Layoutlib
        failure -> Robolectric fallback -> missing thumbnail), not fail assemble/check;
        navCheck must honor allowMissingBaseline; reflective access to AGP/KSP/KMP APIs must
        be guarded so absence of a plugin disables the feature instead of throwing.
        (2) WIRING TIMING — KSP processor auto-wiring MUST happen eagerly at
        configuration-creation time (configurations.configureEach + isNavGraphKspConfig);
        moving it to afterEvaluate silently produces an empty manifest on KMP+Android because
        KSP snapshots its configurations first. Treat any such move as a critical bug.
        (3) LAZY CONFIGURATION — Provider/TaskProvider/configureEach only; no eager task
        realization or configuration-time .get() outside providers.
        (4) CONFIGURATION CACHE — generate/export pipelines have known CC sensitivities
        (taskGraph.whenReady must not capture Task/Project references in stored state). Flag
        new whenReady/afterEvaluate blocks that hold task or project references.
        (5) VERSION PIN — auto-wired coordinates (annotations/ksp/testing) come from the
        generated /navgraph.version resource sourced from gradle.properties VERSION_NAME,
        with a hardcoded fallback; flag any bump that touches one but not the others.
        (6) LAYOUTLIB PAIR — LAYOUTLIB_VERSION, LAYOUTLIB_RENDERER_VERSION, and LAYOUTLIB_API
        are an atomic set; bumping one without the others breaks device-free rendering.
        (7) AGGREGATION — the navgraph.graph attribute values ("nav-graph"/"nav-gallery"),
        the lenient artifactView with projectComponentFilter, and the merge of the module's
        OWN graph plus dependencies' graphs (so a single-module app is not empty) are all
        contracts; node dedup is by id (FQN).
        (8) RENDER-LIST PROTOCOL — the navgraph.jobCount / navgraph.renderList.<i> /
        navgraph.thumbsDir.<i> / navgraph.previewIndex.<i> system properties must exactly
        match what compose-nav-graph-testing's NavPreviewRenderer reads.
        (9) Variant/task-name matching heuristics (ksp<V>DebugKotlin, test<V>UnitTest,
        kspAndroidMain vs legacy names) are case-sensitivity traps; require unit tests for
        new matching rules.

    # ===== compose-nav-graph-idea: IntelliJ plugin (separate build) =====
    - path: "compose-nav-graph-idea/src/main/**"
      instructions: >-
        IntelliJ/Android Studio plugin (separate IntelliJ Platform build). Check:
        (1) THREADING — file IO and graph loading (NavGraphReader.loadScopes) stay off the
        EDT; PSI access only inside read actions; UI mutation only on EDT (invokeLater);
        listeners/executors tied to a Disposable (tool-window content parent).
        (2) PARSER TOLERANCE — Gson DTO parsing must stay lenient for forward compatibility
        (unknown fields ignored, schemaVersion > 1 warns instead of failing); DTO fields must
        mirror the NavGraph model in compose-nav-graph-annotations — flag drift between the
        @Serializable model and the DTOs.
        (3) RESOLUTION SAFETY — KotlinClickTargetResolver and any K2/PSI resolution can fail
        in dumb mode or partially-indexed projects: wrap in runCatching, degrade to "no
        navigation" instead of throwing; the Kotlin plugin is an OPTIONAL dependency, so
        Kotlin-PSI code must live behind the navgraph-kotlin.xml optional config and never be
        referenced from the always-loaded classpath.
        (4) PATH CONTRACT — manifests are discovered at build/navgraph/nav-graph.json and
        thumbnails under build/navgraph/thumbs/ (plus navgallery for the gallery tab)
        relative to each module; these paths are owned by the KSP/Gradle layers — flag
        one-sided changes.
        (5) plugin.xml — new services/actions/extensions registered consistently with
        existing patterns (projectService, projectConfigurable, notificationGroup); the
        optional-depends config-file name must match an actual META-INF resource.
        (6) Swing canvas code (NavGraphCanvas) repaints on property changes — watch for
        unbounded listener accumulation and painting work proportional to graph size on every
        frame.

    # ===== compose-nav-graph-testing: published Robolectric render support =====
    - path: "compose-nav-graph-testing/src/**"
      instructions: >-
        Published test-support library (explicit API) that consumers' generated
        NavGraphRobolectricRenderTest extends. Check:
        (1) RENDER DETERMINISM — @Config(sdk, qualifiers) and @GraphicsMode.NATIVE define the
        rendering environment for every consumer's committed thumbnails; changing them
        changes all rendered output and must be called out as such.
        (2) SYSTEM-PROPERTY PROTOCOL — NavPreviewRenderer reads navgraph.renderList.<i> /
        navgraph.thumbsDir.<i> / navgraph.previewIndex.<i> / navgraph.jobCount injected by
        the Gradle plugin; key changes must be mirrored there in the same PR.
        (3) REFLECTION SAFETY — composable/@PreviewParameter provider instantiation via
        reflection must catch per-preview failures and continue with the remaining previews,
        reporting which preview failed.
        (4) PUBLIC API — base-class signature changes break already-generated consumer tests;
        keep them additive and update api/*.api dumps.

    # ===== samples =====
    - path: "samples/sample/**"
      instructions: >-
        Plain-Android integration sample. Composables and routes here intentionally exercise
        annotation/extraction edge cases; do not suggest production-app refactors. Focus on
        whether NavGraphExtractionTest still pins the KSP manifest contract and on
        build-script correctness against the CURRENT plugin DSL (navgraph { ... } extension
        properties).

    - path: "samples/sample-kotlinconf/**"
      instructions: >-
        Compose Multiplatform sample (jvm/js/wasmJs, multi-module) — exercises the KMP wiring
        path (kspCommonMainKotlinMetadata, structure-only graphs, no Android render). Review
        only for build correctness and that it keeps exercising the KMP code path; do not
        review app code style.

    - path: "samples/sample-nowinandroid/**"
      instructions: >-
        Vendored Now in Android used as a real-world multi-module integration test for
        cross-module aggregation. Do NOT review upstream NIA code style or architecture —
        only the navgraph-specific deltas: annotations on screens, plugin application in
        build scripts, and that previews stay render-safe for the device-free renderer
        (stateless composables; no hiltViewModel()/maps/exoplayer/camera in preview bodies).

    # ===== build logic & versions =====
    - path: "**/*.gradle.kts"
      instructions: >-
        Check plugin/dependency declarations go through gradle/libs.versions.toml, no
        hardcoded credentials or plaintext secrets, and publishing/signing config keeps the
        local-development path (mavenLocal + includeBuild composite) working. Remember
        compose-nav-graph-gradle and compose-nav-graph-idea are SEPARATE builds with their
        own settings.gradle.kts — version-catalog or repository changes may need mirroring.

    - path: "gradle/libs.versions.toml"
      instructions: >-
        Version bumps fan out: the KSP version must stay compatible with the pinned Kotlin
        version; Compose/AGP bumps affect the Layoutlib render path and the testing module's
        Robolectric config; gradle.properties VERSION_NAME drives the auto-wired artifact
        coordinates. Flag partial bumps.

    # ===== CI =====
    - path: ".github/workflows/**"
      instructions: >-
        CI invariants: sample builds resolve the navgraph plugin via the includeBuild
        composite but the published artifacts (annotations/ksp/testing) from mavenLocal —
        jobs building samples need the publishToMavenLocal bootstrap first. The IDE plugin
        builds in a SEPARATE Gradle invocation (./gradlew -p compose-nav-graph-idea).
        Release publishing must keep --no-configuration-cache where present. Flag action
        version downgrades and any step that could leak signing secrets into logs.

    # ===== docs =====
    - path: "{README.md,docs/**,mkdocs.yml}"
      instructions: >-
        User-facing documentation. Verify code snippets compile against the CURRENT DSL/API
        (navgraph extension properties, annotation parameters, task names like
        generateNavGraph/navDump/navCheck/exportNavGraphHtml/exportPreviewGalleryImage, and
        the -Pnavgraph.export.* / -Pnavgraph.gallery.* properties), and that documented file
        paths (build/navgraph/nav-graph.json, nav/<name>.nav) match the implementation. Do
        not nitpick prose style.

  # ── Static analysis tools ────────────────────────────────────────────────────
  tools:
    # Style/formatting is owned by Spotless in CI; keep style linters off to avoid
    # duplicate noise.
    detekt:
      enabled: false
    markdownlint:
      enabled: false
    # Secrets must never land in a public repo.
    gitleaks:
      enabled: true
    # Workflow files are part of the release path; lint them.
    actionlint:
      enabled: true
    yamllint:
      enabled: true

chat:
  auto_reply: true
